<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
</head>
<body>
    <h2>Registration Form</h2>

    <form action="" method="post">
        <label for="name" >Name:</label>
        <input type="text" id="name" placeholder="piyush123">
        <br> <br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="xyz@gmao.com">
        <br><br>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="8charactor min">
        <br><br>

        <label for="hobbies">Hobbies</label>
        <input type="checkbox" name="hobby" id="hobby" value="reading">reading
        <input type="checkbox" name="hobby" id="hobby" value="sport">Sports
        <br><br>

        <label for="gender">Gender:</label><br>
        <input type="radio" name="gender" id="gender" value="male">male
        <input type="radio" name="gender" id="gender" value="female">Female
        <br><br>

        <label for="country">Country:</label>
        <select name="country" id="country">
            <option value="india">India</option>
            <option value="USA">USA</option>
            <option value="germany">Germany</option>
        </select><br> <br>

        <label for="message">Message:</label>
        <textarea name="textarea" id="textarea"></textarea>
        <br><br>

        <input type="submit" value="Register">

        
</body>
</html>
